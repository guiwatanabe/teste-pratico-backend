name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

#      - name: Setup Node
#        uses: actions/setup-node@v4
#        with:
#          node-version: '22'

#      - name: Install Node Dependencies
#        run: npm i

#      - name: Add Flux Credentials Loaded From ENV
#        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

#      - name: Build Assets
#        run: npm run build

      - name: Start Gateway Mocks
        run: docker run -d -p 3001:3001 -p 3002:3002 matheusprotzen/gateways-mock

      - name: Run Tests
        env:
          GATEWAY_1_BASE_URL: ${{ vars.GATEWAY_1_BASE_URL }}
          GATEWAY_1_AUTH_EMAIL: ${{ secrets.GATEWAY_1_AUTH_EMAIL }}
          GATEWAY_1_AUTH_TOKEN: ${{ secrets.GATEWAY_1_AUTH_TOKEN }}
          GATEWAY_2_BASE_URL: ${{ vars.GATEWAY_2_BASE_URL }}
          GATEWAY_2_HEADER_TOKEN: ${{ secrets.GATEWAY_2_HEADER_TOKEN }}
          GATEWAY_2_HEADER_SECRET: ${{ secrets.GATEWAY_2_HEADER_SECRET }}
        run: ./vendor/bin/pest
